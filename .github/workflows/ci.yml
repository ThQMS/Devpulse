name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  quality:
    name: Quality Gate
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: devpulse
          POSTGRES_PASSWORD: devpulse
          POSTGRES_DB: devpulse
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U devpulse -d devpulse"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    env:
      DATABASE_URL: postgresql://devpulse:devpulse@localhost:5432/devpulse
      REDIS_URL: redis://localhost:6379
      API_KEY: ci-api-key
      FRONTEND_URL: http://localhost:5173
      RETENTION_DAYS: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.0.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.12.2
          cache: pnpm

      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile

      - name: Format check
        run: corepack pnpm format:check

      - name: Lint
        run: corepack pnpm lint

      - name: Test
        run: corepack pnpm test

      - name: Build
        run: corepack pnpm build
